<!DOCTYPE html>
<html>
<head>
    <title>Digit AI PRO</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TensorFlow -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

    <!-- ✅ FIXED CSS PATH -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body onload="init()">

    <h1 class="heading">Digit AI PRO</h1>

    <canvas id="sketchpad" width="300" height="300"></canvas>

    <div class="buttons_div">
        <button id="clear_button" class="btn">Clear</button>
        <button onclick="predictMultiple()" class="btn">Multi Digit</button>
        <button onclick="startCamera()" class="btn">Camera</button>
    </div>

    <h2 id="result">Loading...</h2>
    <p id="confidence">Confidence: -</p>

    <video id="camera" autoplay playsinline></video>

    <!-- ✅ FIXED JS PATH -->
    <script src="js/main.js"></script>

</body>
</html>
